name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-to-server:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via Rsync
  uses: Burnett01/rsync-deployments@7.0.0
  with:
    switches: >-
      -avzr
      --no-times
      --omit-dir-times
      --no-perms
      --no-owner
      --no-group
      --checksum
      --exclude='.git*'
      --exclude='.github*'
      --exclude='.env'
      --exclude='node_modules'
      --exclude='error_log'
    path: ./
    remote_path: /home/${{ secrets.SERVER_USER }}/public_html/lei.developmentalphawizz.com/
    remote_host: ${{ secrets.SERVER_IP }}
    remote_user: ${{ secrets.SERVER_USER }}
    remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
